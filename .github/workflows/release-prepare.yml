name: Release - Prepare

# Triggered automatically when mobile-sdk-internal publishes a new Android or iOS SDK.
# Updates the native SDK dependency references and opens a PR for review.
# The wrapper version (package.json "version") is NOT auto-bumped — bump it manually in the PR if needed.

on:
  repository_dispatch:
    types: [android-release, ios-release]
  # Manual re-trigger in case repository_dispatch fails
  workflow_dispatch:
    inputs:
      android_version:
        description: "Android SDK version to set (leave empty to keep current)"
        required: false
      ios_version:
        description: "iOS SDK version to set (leave empty to keep current)"
        required: false

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve versions
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            ANDROID_V="${{ github.event.client_payload.android_version }}"
            IOS_V="${{ github.event.client_payload.ios_version }}"
          else
            ANDROID_V="${{ inputs.android_version }}"
            IOS_V="${{ inputs.ios_version }}"
          fi
          echo "android_version=$ANDROID_V" >> $GITHUB_OUTPUT
          echo "ios_version=$IOS_V" >> $GITHUB_OUTPUT

          # Determine branch name from whichever version is being bumped
          if [ -n "$ANDROID_V" ] && [ -n "$IOS_V" ]; then
            echo "branch=release/native-android-${ANDROID_V}-ios-${IOS_V}" >> $GITHUB_OUTPUT
            echo "title=Update native SDKs (Android ${ANDROID_V}, iOS ${IOS_V})" >> $GITHUB_OUTPUT
          elif [ -n "$ANDROID_V" ]; then
            echo "branch=release/android-${ANDROID_V}" >> $GITHUB_OUTPUT
            echo "title=Update Android SDK to ${ANDROID_V}" >> $GITHUB_OUTPUT
          elif [ -n "$IOS_V" ]; then
            echo "branch=release/ios-${IOS_V}" >> $GITHUB_OUTPUT
            echo "title=Update iOS SDK to ${IOS_V}" >> $GITHUB_OUTPUT
          else
            echo "No versions provided — nothing to do."
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: |
          git checkout -b "${{ steps.resolve.outputs.branch }}"

      - name: Bump Android SDK version in android/build.gradle
        if: steps.resolve.outputs.android_version != ''
        run: |
          ANDROID_V="${{ steps.resolve.outputs.android_version }}"
          sed -i "s/io\.refiner:refiner:[0-9.]*/io.refiner:refiner:${ANDROID_V}/" android/build.gradle
          grep "io.refiner:refiner" android/build.gradle

      - name: Bump iOS SDK version in refiner-react-native.podspec
        if: steps.resolve.outputs.ios_version != ''
        run: |
          IOS_V="${{ steps.resolve.outputs.ios_version }}"
          sed -i "s/s\.dependency \"RefinerSDK\", \"~> [0-9.]*\"/s.dependency \"RefinerSDK\", \"~> ${IOS_V}\"/" \
            refiner-react-native.podspec
          grep "RefinerSDK" refiner-react-native.podspec

      - name: Commit and push
        run: |
          git add android/build.gradle refiner-react-native.podspec
          if git diff --staged --quiet; then
            echo "No changes detected — versions may already be up to date."
            exit 0
          fi
          git commit -m "Update native SDK dependencies"
          git push origin "${{ steps.resolve.outputs.branch }}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ANDROID_V="${{ steps.resolve.outputs.android_version }}"
          IOS_V="${{ steps.resolve.outputs.ios_version }}"
          BRANCH="${{ steps.resolve.outputs.branch }}"
          TITLE="${{ steps.resolve.outputs.title }}"

          ANDROID_LINE=""
          IOS_LINE=""
          [ -n "$ANDROID_V" ] && ANDROID_LINE="- Android SDK: \`io.refiner:refiner:${ANDROID_V}\`"
          [ -n "$IOS_V" ] && IOS_LINE="- iOS SDK: \`RefinerSDK ~> ${IOS_V}\`"

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$(cat <<EOF
          # What it does

          This pull request updates the native SDK dependency references.

          **Changes:**
          ${ANDROID_LINE}
          ${IOS_LINE}

          > **Note:** The \`package.json\` wrapper version has NOT been bumped automatically.
          > If this release requires a wrapper version bump, do it manually before merging.
          > npm publish is done manually by the publishing team after merging.

          # How to test it

          1. Pull this branch and run the example app
          2. Verify the native SDK version resolves correctly
          3. Test any updated API surface if applicable

          # Acceptance criteria

          * Native SDK dependencies reference the correct versions
          * Example app builds and runs successfully

          # Link to ticket

          [Add Trello link here]

          ---
          > **Before merging:** Add a comment **"Reviewed & tested"** to confirm you have reviewed and tested this release.
          EOF
          )")
          echo "PR created: $PR_URL"
          echo "## $TITLE" >> $GITHUB_STEP_SUMMARY
          echo "PR: $PR_URL" >> $GITHUB_STEP_SUMMARY
          echo "> Remember: npm publish is done manually by the publishing team." >> $GITHUB_STEP_SUMMARY
